name: smart-pipeline workflow

on: 
  workflow_dispatch: 

jobs:
  lint-job:
   runs-on: ubuntu-latest

   steps:
     - name: run the lint job
       run: echo "ran lint job"

  test-job:
    runs-on: ubuntu-latest

    steps:
      - name: run the test job
        run: echo "ran test job"

  summary-job:
    runs-on: ubuntu-latest
    needs: [lint-job, test-job]

    steps:
      - name: print the branch type
        run: |
          if [[ "${{ github.ref }}" == "refs/heads/main" ]]; then
            echo "This is a MAIN branch push"
          else
            echo "This is a FEATURE branch push"
            fi


      - name: print commit message
        run: echo "print commit message ${{ github.event.head_commit.message }}"
          

        

  
    
