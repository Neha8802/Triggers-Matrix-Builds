    env:
      ENVIRONMENT: staging

    steps:
      - name: print all env variables
        env:
          VERSION: 1.0.0

        run:
          echo $APP_NAME: myapp $ENVIRONMENT: staging $VERSION: 1.0.0


      

     
      
