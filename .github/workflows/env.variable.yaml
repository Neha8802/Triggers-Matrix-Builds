name: workflow with env var

on: 
  push:

env:
  APP_NAME: myapp

jobs:
  env-var-workflow:
    runs-on: ubuntu-latest
    env:
      ENVIRONMENT: staging

    steps:
      - name: print all env variables
        env:
          VERSION: 1.0.0

        run: |
          echo "APP_NAME: $APP_NAME"
          echo "ENVIRONMENT: $ENVIRONMENT"
          echo "VERSION: $VERSION"


      

     
      
