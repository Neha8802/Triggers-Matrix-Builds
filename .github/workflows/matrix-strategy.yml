name: matrix strategy workflow

on: 
  push:

jobs:
  matrix-strategy:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        python-version: [3.10, 3.11, 3.12]

    steps:
      - name: checkout code
        uses: actions/checkout@v4

      - name: setup pyhton
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: display python version
        run: python --version
      
  
