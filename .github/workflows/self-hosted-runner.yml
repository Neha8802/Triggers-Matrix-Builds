name: self hosted workflow

on: 
  push:

jobs:
  self-hosted-workflow:
    runs-on: self-hosted

    steps:

      - name: print the hostname
        run: hostname

      - name: print current working directory
        run:  get location

      - name: create a file 
        run: echo creating file -Path "C:\github_test_file.txt"

      - name: verify the file exists 
        run: ls C:\github_test_file.txt
