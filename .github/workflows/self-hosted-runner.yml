name: Windows Self-Hosted Demo

on:
  workflow_dispatch: # Allows you to run this manually from the Actions tab

jobs:
  check-my-hardware:
    # This tells GitHub to look for your local machine
    runs-on: self-hosted

    steps:
      - name: 1. Print Hostname
        run: hostname

      - name: 2. Print Working Directory
        run: pwd

      - name: 3. Create a test file
        shell: powershell
        run: |
          $content = "This file was created by GitHub Actions at $(Get-Date)"
          Set-Content -Path "C:\github_test_file.txt" -Value $content
          Write-Host "File created at C:\github_test_file.txt"

      - name: 4. Verify file exists (from Runner's perspective)
        run: ls C:\github_test_file.txt
