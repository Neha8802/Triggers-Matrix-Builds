name: self hosted workflow

on:
  push:

jobs:
  linux-self-hosted-runner:
    runs-on: [self-hosted, my-linux-runner]

    steps:
      - name: print the hostname
        run: hostname

      - name: print the current working directory
        run: pwd

      - name: Create a file 
        run: touch my.file.txt

      - name: verify if file exist
        run: ls -l my.file.txt
