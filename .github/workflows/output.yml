name: output workflow

on: 
  push:

jobs:
  job-output:
    runs-on: ubuntu-latest
    outputs:
      todays: ${{ steps.set_date.outputs.today }}

    steps:
      - name: set todays date
        id:   set_date
        run: echo "today=$(date +'%Y-%m-%d')" >> $GITHUB_OUTPUT
 

  print-output:
    runs-on: ubuntu-latest
    needs: job-output

    steps:
      - name: print the date 
        run: echo "${{ needs.job-output.outputs.todays }}"
    
   
